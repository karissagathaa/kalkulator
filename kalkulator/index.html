<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>PROGRAM KALKULATOR</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 20px;
            background-color: #fff;
        }

        h2 {
            font-size: 18px;
            margin-bottom: 16px;
        }

        .kalkulator {
            display: inline-block;
            border: 2px solid #6ab86a;
            border-radius: 16px;
            padding: 16px;
            background-color: #f0faf0;
        }

        #layar {
            width: 220px;
            padding: 6px 10px;
            font-size: 18px;
            text-align: right;
            border: 2px solid #a8d8a8;
            border-radius: 8px;
            background-color: #fff;
            outline: none;
            display: block;
            margin: 0 auto 8px auto;
            box-sizing: border-box;
        }

        .tombol-grid {
            display: inline-grid;
            grid-template-columns: repeat(4, 52px);
            gap: 6px;
            margin-top: 4px;
        }

        button {
            width: 52px;
            height: 44px;
            font-size: 15px;
            font-weight: 600;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: filter 0.1s;
        }

        button:active {
            filter: brightness(0.9);
        }

        .btn-num {
            background-color: #dff2df;
            color: #3a7a3a;
        }

        .btn-operator {
            background-color: #b8e0b8;
            color: #2a5e2a;
        }

        .btn-clear {
            background-color: #a8d8a8;
            color: #1e4e1e;
        }

        .btn-equals {
            background-color: #78c478;
            color: #fff;
        }

        small {
            display: block;
            margin-top: 14px;
            color: gray;
            font-size: 12px;
        }
    </style>
</head>
<body>

    <h2>PROGRAM KALKULATOR</h2>

    <div class="kalkulator">
        <input id="layar" readonly value="0">

        <div class="tombol-grid">
            <button class="btn-num"      onclick="tekanAngka('1')">1</button>
            <button class="btn-num"      onclick="tekanAngka('2')">2</button>
            <button class="btn-num"      onclick="tekanAngka('3')">3</button>
            <button class="btn-operator" onclick="tekanOperator('+')">+</button>

            <button class="btn-num"      onclick="tekanAngka('4')">4</button>
            <button class="btn-num"      onclick="tekanAngka('5')">5</button>
            <button class="btn-num"      onclick="tekanAngka('6')">6</button>
            <button class="btn-operator" onclick="tekanOperator('-')">-</button>

            <button class="btn-num"      onclick="tekanAngka('7')">7</button>
            <button class="btn-num"      onclick="tekanAngka('8')">8</button>
            <button class="btn-num"      onclick="tekanAngka('9')">9</button>
            <button class="btn-operator" onclick="tekanOperator('*')">*</button>

            <button class="btn-clear"    onclick="empty()">C</button>
            <button class="btn-num"      onclick="tekanAngka('0')">0</button>
            <button class="btn-equals"   onclick="hitung()">=</button>
            <button class="btn-operator" onclick="tekanOperator('/')">/</button>
        </div>
    </div>

    <script>
        var angkaPertama = null;
        var operatorAktif = null;
        var inputBaru = true;

        function tekanAngka(angka) {
            var layar = document.getElementById("layar");
            if (inputBaru) {
                layar.value = angka;
                inputBaru = false;
            } else {
                // Mencegah angka nol di depan (kecuali untuk angka desimal nanti)
                if (layar.value === "0") {
                    layar.value = angka;
                } else {
                    layar.value = layar.value + angka;
                }
            }
        }

        function tekanOperator(op) {
            var layar = document.getElementById("layar");
            
            // Jika sudah ada operator sebelumnya, hitung dulu
            if (angkaPertama !== null && operatorAktif !== null && !inputBaru) {
                hitung();
                // Setelah hitung, angkaPertama dan operatorAktif sudah direset
                // Tapi kita ingin melanjutkan dengan operator baru
                angkaPertama = parseFloat(document.getElementById("layar").value);
                operatorAktif = op;
                inputBaru = true;
            } else {
                // Simpan angka pertama dan operator
                angkaPertama = parseFloat(layar.value);
                operatorAktif = op;
                inputBaru = true;
            }
        }

        function hitung() {
            if (angkaPertama === null || operatorAktif === null) return;
            
            var layar = document.getElementById("layar");
            var angkaKedua = parseFloat(layar.value);
            var hasil;

            // Lakukan perhitungan berdasarkan operator
            if (operatorAktif === '+') {
                hasil = angkaPertama + angkaKedua;
            } else if (operatorAktif === '-') {
                hasil = angkaPertama - angkaKedua;
            } else if (operatorAktif === '*') {
                hasil = angkaPertama * angkaKedua;
            } else if (operatorAktif === '/') {
                if (angkaKedua === 0) {
                    layar.value = "Error";
                    angkaPertama = null;
                    operatorAktif = null;
                    inputBaru = true;
                    return;
                }
                hasil = angkaPertama / angkaKedua;
            }

            // Tampilkan hasil
            layar.value = hasil;
            
            // Reset untuk operasi berikutnya
            angkaPertama = null;
            operatorAktif = null;
            inputBaru = true;
        }

        function empty() {
            document.getElementById("layar").value = "0";
            angkaPertama = null;
            operatorAktif = null;
            inputBaru = true;
        }
    </script>

</body>
</html>
